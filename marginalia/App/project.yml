name: MarginaliaApp
options:
  bundleIdPrefix: com.mnemeatrium
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
packages:
  Marginalia:
    path: ..
targets:
  MarginaliaApp:
    type: application
    platform: [iOS, macOS]
    sources: [Sources]
    dependencies:
      - package: Marginalia
        product: Marginalia
    settings:
      base:
        PRODUCT_NAME: Marginalia
        PRODUCT_MODULE_NAME: MarginaliaApp
        PRODUCT_BUNDLE_IDENTIFIER: com.mnemeatrium.marginalia
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Marginalia
        SWIFT_VERSION: "5.10"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
